name: CI + Deploy Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - run: npm test -- --watch=false

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - run: npm run lint

  build:
    needs:
      - test
      - lint

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - name: Build development
        run: |
          npm run build -- \
            --configuration development \
            --output-path dist/dev

      - name: Build production
        run: |
          npm run build -- \
            --configuration production \
            --output-path dist/prod

      - name: Prepare Pages artifact
        run: |
          mkdir pages

          cp -r dist/dev pages/dev
          cp -r dist/prod pages/prod

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    needs: build

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
